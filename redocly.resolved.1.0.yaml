                        - updatedDateTime
                      type: object
                      properties: &ref_19
                        recordId:
                          type: string
                          format: uuid
                          example: 8ebb6b04-6ab0-4fe2-ad62-e6389a8a204f
                          description: ID of the record for the TGP Product in the TGP Core database (UUID)
                        eori:
                          type: string
                          pattern: ^[A-Z]{2}\d{12,15}$
                          minLength: 14
