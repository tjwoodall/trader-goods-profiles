                        category:
                          type: integer
                          minimum: 1
                          maximum: 3
                          example: 2
                          description: To be retrieved using the Online Trade Tariff API. The category of the goods based on applicable restrictions, prohibitions or any exemptions the trader may hold.
                          enum: *ref_0
                        assessments:
