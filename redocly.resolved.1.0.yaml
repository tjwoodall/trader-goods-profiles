                          example: GB123456789012
                          description: The traders' EORI number. The first 2 letters are the country code, like GB followed by 12 to 15 digits.
                        actorId:
                          type: string
                          pattern: ^[A-Z]{2}\d{12,15}$
                          minLength: 14
                          maxLength: 17
                          example: GB987654321098
                          description: EORI number of the user making the change. This may be different to the eori. The first 2 letters are the country code, like GB or XI followed by 12 to 15 digits.
                        traderRef:
                          type: string
                          minLength: 1
                          maxLength: 512
                          example: SKU123456
                          description: Unique product reference traders use to identify the goods. For example a Stock Keeping Unit (SKU) code. If the trader does not provide a traderRef, the front end should duplicate the goodsDescription field and pass this as traderRef.
                        comcode:
                          type: string
                          pattern: ^([0-9]{6}|[0-9]{8}|[0-9]{10})$
                          example: '0810100000'
                          description: A code specific to goods that must be 6, 8, or 10 digits long. Only numeric values are allowed.
                        adviceStatus:
                          type: string
                          minLength: 1
                          maxLength: 35
                          description: Indicates the advice status of a record if the trader has requested that HMRC review their commodity code.
                          example: Not Requested
                          enum: *ref_7
                        goodsDescription:
                          type: string
                          minLength: 1
                          maxLength: 512
                          example: Bananas
                          description: A description of the goods that the trader can choose. This field does not need to be unique.
                        countryOfOrigin:
                          type: string
